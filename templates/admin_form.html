<!DOCTYPE html>
<html>
<head>
    <title>Добавление торта</title>
    <style>
        body { font-family: Arial; background: #fff5f5; padding: 20px; }
        form { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: 0 auto; }
        input, select, textarea { display: block; width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #ff6b6b; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h2>➕ Добавить торт</h2>
    <form method="POST">
        <input name="name" placeholder="Название" required>
        <select name="category_id" required>
            <option value="">-- Категория --</option>
            {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
        <select name="cake_type_id" required>
            <option value="">-- Тип --</option>
            {% for t in types %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}
        </select>
        <select name="confectionery_id" required>
            <option value="">-- Кондитерская --</option>
            {% for c in confs %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
        <textarea name="description" placeholder="Описание"></textarea>
        <input type="number" step="0.01" name="price" placeholder="Цена" required min="0">
        <input type="number" name="quantity_in_stock" placeholder="Количество" value="0" min="0">
        <input type="number" step="0.01" name="discount" placeholder="Скидка %" value="0" min="0" max="100">
        <button type="submit">Добавить</button>
    </form>
    <a href="/cakes">← Назад</a>
</body>
</html>
